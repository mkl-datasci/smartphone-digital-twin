<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone Digital Twin</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* GLOBAL STYLES */
        body { 
            margin: 0; 
            background: #111; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
        }

        /* UI OVERLAY */
        #dashboard {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            width: 300px;
            padding: 15px; 
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff00; 
            border-radius: 5px; 
            z-index: 10;
        }

        #controls { 
            margin-top: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        button { 
            background: #222; 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            padding: 10px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover { 
            background: #00ff00; 
            color: #000; 
        }

        button:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        /* ANALYTICS VIEW */
        #graph-container {
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            right: 20px; 
            height: 150px;
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #444; 
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div style="font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;">SYSTEM TELEMETRY</div>
        <div id="status">STATUS: OFFLINE</div>
        <div id="record-count">SAMPLES: 0</div>
        
        <div id="controls">
            <button id="toggleBtn" onclick="toggleRecording()">START CAPTURE</button>
            <button onclick="resetOrientation()">RECALIBRATE (ZERO)</button>
            <button id="downloadBtn" onclick="downloadCSV()" disabled>DOWNLOAD CSV</button>
        </div>
    </div>

    <div id="data-bridge" style="display:none;"></div>

    <div id="graph-container">
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        // CONFIGURATION & STATE
        const USER_IP = prompt("Enter your Phyphox IP address:", "192.168.4.48");
        const PHONE_IP = `http://${USER_IP}:8080`;
        
        let capturedData = [];
        let isRecording = false;
        let offsetX = 0, offsetY = 0, offsetZ = 0;

        // ANALYTICS INITIALIZATION
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: Array(50).fill(''), 
                datasets: [{ 
                    data: Array(50).fill(0), 
                    borderColor: '#00ff00', 
                    fill: false, 
                    tension: 0.4,
                    pointRadius: 0
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                scales: { 
                    y: { min: -180, max: 180, grid: { color: '#333' } },
                    x: { display: false }
                }, 
                plugins: { legend: { display: false } } 
            }
        });

        // 3D ENGINE INITIALIZATION
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const phone = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 3, 0.2), 
            new THREE.MeshNormalMaterial()
        );
        scene.add(phone);
        camera.position.z = 5;

        // USER INTERACTION
        function resetOrientation() {
            offsetX = phone.rotation.x + offsetX;
            offsetY = phone.rotation.y + offsetY;
            offsetZ = phone.rotation.z + offsetZ;
        }

        function toggleRecording() {
            isRecording = !isRecording;
            const btn = document.getElementById('toggleBtn');
            const dlBtn = document.getElementById('downloadBtn');
            btn.innerText = isRecording ? "STOP CAPTURE" : "START CAPTURE";
            btn.style.color = isRecording ? "#ff0000" : "#00ff00";
            btn.style.borderColor = isRecording ? "#ff0000" : "#00ff00";
            if (isRecording) {
                capturedData = [];
                dlBtn.disabled = true;
            } else {
                dlBtn.disabled = false;
            }
        }

        function downloadCSV() {
            const header = "Timestamp,Pitch_X,Yaw_Y,Roll_Z\n";
            const rows = capturedData.map(r => `${r.time},${r.x},${r.y},${r.z}`).join("\n");
            const blob = new Blob([header + rows], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `twin_telemetry_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // DATA BRIDGE (JSONP Implementation)
        function updateTwin() {
            const script = document.createElement('script');
            // Adding callback=processData allows the browser to read the response as a script
            script.src = `${PHONE_IP}/get?gyroX&gyroY&gyroZ&callback=processData`;
            
            const bridge = document.getElementById('data-bridge');
            bridge.innerHTML = ''; 
            bridge.appendChild(script);
        }

        // Function called automatically when phone data arrives
        function processData(data) {
            if (data.buffer) {
                const { gyroX, gyroY, gyroZ } = data.buffer;

                // Virtual Mapping
                phone.rotation.set(gyroX.value - offsetX, gyroY.value - offsetY, gyroZ.value - offsetZ);

                // Telemetry Conversion
                const xDeg = ((gyroX.value - offsetX) * 180 / Math.PI).toFixed(2);
                const yDeg = ((gyroY.value - offsetY) * 180 / Math.PI).toFixed(2);
                const zDeg = ((gyroZ.value - offsetZ) * 180 / Math.PI).toFixed(2);

                // Live Graph Update
                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(xDeg);
                chart.update('none');

                if (isRecording) {
                    capturedData.push({ 
                        time: new Date().toLocaleTimeString(), 
                        x: xDeg, y: yDeg, z: zDeg 
                    });
                    document.getElementById('record-count').innerText = `SAMPLES: ${capturedData.length}`;
                }
                
                document.getElementById('status').innerText = "STATUS: LIVE";
                document.getElementById('status').style.color = "#00ff00";
            }
        }

        // Execution Engines
        setInterval(updateTwin, 50);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
